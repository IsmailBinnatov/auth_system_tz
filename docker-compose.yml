services:
  auth_system_db:
    image: postgres:15-alpine
    container_name: auth_system_db
    env_file:
      - ./.env
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - auth_system_db_data:/var/lib/postgresql/data

  auth_system_api:
    build: .
    container_name: auth_system_api
    env_file:
      - ./.env
    ports:
      - "8000:8000"
    depends_on:
      auth_system_db:
        condition: service_healthy
        
    command: sh -c "alembic upgrade head && python -m app.seed.seed && uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  auth_system_db_data: